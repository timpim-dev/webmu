<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribute - WebMu</title>
  <script src="./Scripts/global.js"></script>
  <link rel="stylesheet" href="index-css.css">
  <link rel="stylesheet" href="color.css">
  <style>
    .contribute-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 32px; margin-top: 24px; }
    @media (max-width: 800px) { .contribute-grid { grid-template-columns: 1fr; } }
    
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted2); margin-bottom: 8px; }
    .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--accent); font-size: 14px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); outline: none; }
    
    .catalog-search { margin-bottom: 16px; position: sticky; top: 60px; z-index: 10; background: var(--bg); padding: 10px 0; }
    .catalog-list { display: flex; flex-direction: column; gap: 12px; }
    .catalog-item { display: flex; align-items: center; gap: 16px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
    .catalog-thumb { width: 40px; height: 56px; background: var(--bg); border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .catalog-info { flex: 1; min-width: 0; }
    .catalog-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .catalog-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .system-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--muted2); }
    
    .success-msg { color: #4ade80; font-size: 14px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <nav id="mainNav">
    <div class="nav-brand">WebMu</div>
    <a href="index.html">Home</a>
    <a href="raw.html">Consoles</a>
    <a href="collection.html">Collection</a>
    <a href="contribute.html" class="active">Contribute</a>
    <a href="stats.html">Stats</a>
    <a href="chat.html">Chat</a>
    <a href="account.html">Account</a>
    <a href="splits.html">Splits</a>
    <a href="faq.html">FAQ</a>
    <div class="nav-right">
      <button class="dark-toggle" id="themeToggle">T</button>
    </div>
  </nav>

  <div class="page">
    <div class="contribute-grid">
      <div class="submit-section">
        <div class="panel-kicker">Contribution</div>
        <h2>Submit to Catalog</h2>
        <p style="font-size: 14px; color: var(--muted); margin-bottom: 24px;">Add missing games to the shared public library. ROMs are not uploaded.</p>
        
        <div class="panel">
          <form id="contributeForm">
            <div class="field">
              <label>Game Name</label>
              <input type="text" id="gameName" required placeholder="e.g. Super Mario World" />
            </div>
            <div class="field">
              <label>System</label>
              <select id="gameSystem" required>
                <option value="">Select a system</option>
                <option value="nes">NES / Famicom</option>
                <option value="snes">Super NES / Super Famicom</option>
                <option value="gameboy">Game Boy / GBC / GBA</option>
                <option value="gamewatch">Game & Watch</option>
                <option value="genesis">Genesis / Mega Drive</option>
                <option value="gamegear">Game Gear</option>
                <option value="playstation">PlayStation</option>
                <option value="psp">PSP</option>
                <option value="n64">Nintendo 64</option>
                <option value="nds">Nintendo DS</option>
              </select>
            </div>
            <div class="field">
              <label>Cover Image URL</label>
              <input type="url" id="gameCover" placeholder="https://..." />
            </div>
            <div class="field">
              <label>Notes</label>
              <textarea id="gameNotes" rows="3" placeholder="Additional info..."></textarea>
            </div>
            <div class="field">
              <label>External ID / Source ID</label>
              <input type="text" id="gameExternalId" placeholder="e.g. IGDB ID" />
            </div>
            <button type="submit" class="btn primary" id="submitBtn">Submit to Catalog</button>
            <div id="successMsg" class="success-msg">Successfully added to catalog!</div>
          </form>
        </div>
      </div>

      <div class="list-section">
        <div class="panel-kicker">Public Library</div>
        <h2>Catalog Explorer</h2>
        
        <div class="catalog-search">
          <input type="text" id="catalogSearch" placeholder="Search catalog by name or system..." />
        </div>
        
        <div id="catalogList" class="catalog-list">
          <div style="color: var(--muted); font-size: 14px;">Loading catalog...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./Scripts/contribute.js"></script>
</body>
</html>
